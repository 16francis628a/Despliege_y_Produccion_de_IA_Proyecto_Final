<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción Eólica - Francisco Areyuna</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { background: white; width: 350px; margin: 50px auto; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { margin: 10px 0; padding: 10px; width: 80%; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .streaming-box { background: #e9ecef; padding: 15px; margin-top: 20px; border-radius: 8px; border-left: 5px solid #007bff; }
        h4 { margin-top: 0; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>IA Generación Eólica</h2>
        
        <form action="/predict" method="post">
            <input type="number" step="any" name="viento" placeholder="Velocidad Viento (m/s)" required>
            <input type="number" step="any" name="curva" placeholder="Curva Teórica" required>
            <input type="number" step="any" name="direccion" placeholder="Dirección Viento (°)" required>
            <button type="submit">Predecir Manual</button>
        </form>

        {% if prediction %}
            <div style="color: #28a745; margin-top: 15px;">
                <h3>Resultado Manual:</h3>
                <p>Viento: {{ viento }} m/s -> <strong>{{ prediction }} kW</strong></p>
            </div>
        {% endif %}

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="streaming-box">
            <h4>📡 Streaming (Kafka)</h4>
            <p>Viento: <span id="viento-val">--</span> m/s</p>
            <p>Predicción: <strong id="pred-val">--</strong> <strong>kW</strong></p>
        </div>
    </div>

    <script>
        function updateStreaming() {
            fetch('/api/streaming') // Esta es la ruta que creamos en app.py
                .then(response => response.json())
                .then(data => {
                    document.getElementById('viento-val').innerText = data.viento;
                    document.getElementById('pred-val').innerText = data.prediccion;
                })
                .catch(err => console.error('Error buscando datos de Kafka:', err));
        }

        // Actualizar cada 2 segundos
        setInterval(updateStreaming, 2000);
    </script>
</body>
</html>
