apiVersion: apps/v1
kind: Deployment
metadata:
  name: eolica-app-deployment
spec:
  replicas: 2  # Tendrás dos copias de tu app corriendo simultáneamente
  selector:
    matchLabels:
      app: eolica-app
  template:
    metadata:
      labels:
        app: eolica-app
    spec:
      containers:
      - name: eolica-app
        image: franciscoareyuna/eolica-app:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"