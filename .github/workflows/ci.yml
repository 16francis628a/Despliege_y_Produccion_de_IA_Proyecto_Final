name: CI Proyecto Eólico

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }} # Necesario si wandb pide login

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Ejecutar Entrenamiento y Ver Métricas
      run: |
        # Ejecutamos el script y GitHub Actions imprimirá los print() en la consola
        python src/train.py 

    - name: Ejecutar Pruebas con Pytest
      run: |
        # Verificamos carga e inferencia del modelo recién generado
        pytest tests/test_model.py

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y Subir imagen (Push)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.app
        push: true
        tags: franciscoareyuna/eolica-app:latest

    - name: Construir imagen de Docker
      if: success()
      run: |
        docker build -f Dockerfile.app -t eolica-app:latest .